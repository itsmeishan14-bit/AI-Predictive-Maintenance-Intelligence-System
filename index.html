<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="PredictAI — AI-powered Predictive Maintenance Intelligence System. Real-time neural network monitoring, failure prediction, anomaly detection, and intelligent maintenance scheduling for manufacturing.">
    <title>PredictAI — Manufacturing Predictive Maintenance Intelligence</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/charts.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/ai-components.css">
    <link rel="stylesheet" href="css/futuristic.css">
    <link rel="stylesheet" href="css/chatbot.css">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>

<body>
    <div class="app-container">

        <!-- ═══════════ SIDEBAR ═══════════ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </div>
                <div class="sidebar-brand">
                    <span class="sidebar-brand-name">PredictAI</span>
                    <span class="sidebar-brand-sub">Maintenance Intelligence</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Main</div>

                <div class="nav-item active" data-view="dashboard" onclick="App.navigateTo('dashboard')">
                    <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    <span>Dashboard</span>
                </div>

                <div class="nav-item" data-view="machines" onclick="App.navigateTo('machines')">
                    <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>Machines</span>
                </div>

                <div class="nav-item" data-view="analytics" onclick="App.navigateTo('analytics')">
                    <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    <span>Analytics</span>
                </div>

                <div class="nav-item" data-view="alerts" onclick="App.navigateTo('alerts')">
                    <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span>Alerts</span>
                    <span class="nav-item-badge">3</span>
                </div>

                <div class="nav-section-label">Intelligence</div>

                <div class="nav-item" data-view="ai" onclick="App.navigateTo('ai')">
                    <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    <span>AI Insights</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-footer-avatar">OP</div>
                <div class="sidebar-footer-info">
                    <div class="sidebar-footer-name">Operator</div>
                    <div class="sidebar-footer-role">Plant Manager</div>
                </div>
            </div>
        </aside>

        <!-- ═══════════ MAIN CONTENT ═══════════ -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h1 class="header-title" id="header-title">Dashboard</h1>
                    <div class="header-breadcrumb" id="header-timestamp"></div>
                </div>
                <div class="header-right">
                    <div class="header-status">
                        <span class="header-status-dot"></span>
                        System Online
                    </div>
                    <button class="header-btn" id="btn-notifications">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="header-btn-badge"></span>
                    </button>
                    <button class="header-btn" id="btn-sound" onclick="SoundFX.toggle()" title="Toggle Sound">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                        </svg>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="view-page active" id="view-dashboard"></div>
                <div class="view-page" id="view-machines"></div>
                <div class="view-page" id="view-analytics"></div>
                <div class="view-page" id="view-alerts"></div>
                <div class="view-page" id="view-ai"></div>
            </div>
        </main>
    </div>

    <!-- Scripts (dependency order) -->
    <script src="js/icons.js"></script>
    <script src="js/data.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/sound-fx.js"></script>
    <script src="js/particle-system.js"></script>
    <script src="js/neural-viz.js"></script>
    <script src="js/digital-twin.js"></script>
    <script src="js/system-status.js"></script>
    <script src="js/ai-model.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/machines.js"></script>
    <script src="js/predictions.js"></script>
    <script src="js/alerts.js"></script>
    <script src="js/ai-insights.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
